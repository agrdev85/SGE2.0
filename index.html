<!doctype html>
<html lang="es" class="no-transitions">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SGE - Sistema de Gestión de Eventos</title>
    <meta name="description" content="Sistema de Gestión de Eventos" />
    <meta name="author" content="SGE" />

    <meta property="og:title" content="SGE - Sistema de Gestión de Eventos" />
    <meta property="og:description" content="Sistema de Gestión de Eventos" />
    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@SGE" />
    <meta name="twitter:image" content="https://SGE.dev/opengraph-image-p98pqg.png" />
    
    <!-- Theme initialization script - prevents flash of wrong theme -->
    <script>
      (function() {
        var theme = localStorage.getItem('sge_theme');
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        var isDark = theme === 'dark' || (theme !== 'light' && prefersDark);
        
        if (isDark) {
          document.documentElement.classList.add('dark');
        }
        
        // Remove the class after React loads to enable transitions
        requestAnimationFrame(function() {
          document.documentElement.classList.remove('no-transitions');
        });
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
